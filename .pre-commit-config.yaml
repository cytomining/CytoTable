# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
  python: python3.10
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-toml
-   repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.12.1"
    hooks:
    -   id: pyproject-fmt
-   repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
    -   id: codespell
        exclude: >
          (?x)^(
              .*\.lock|.*\.csv|.*\.cff|.*\.ipynb|.*\.cppipe
          )$
        additional_dependencies:
        -   tomli
-   repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
    -   id: mdformat
        additional_dependencies:
        -   mdformat-myst
        -   mdformat-gfm
-   repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
    -   id: yamllint
        exclude: ".pre-commit-config.yaml"
-   repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
    -   id: black
-   repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
    -   id: blacken-docs
-   repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
    -   id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
-   repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
    -   id: isort
-   repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
    -   id: vulture
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
    -   id: mypy
        exclude: >
          (?x)(
              test_convert\.py$ |
              cytotable_mise_en_place_general_overview\.py$ |
              cytotable_from_the_cloud\.py$
          )
-   repo: https://github.com/citation-file-format/cffconvert
    rev: b6045d78aac9e02b039703b030588d54d53262ac
    hooks:
    -   id: validate-cff
-   repo: https://github.com/software-gardening/almanack
    rev: v0.1.16
    hooks:
    -   id: almanack-check
-   repo: https://github.com/jsh9/pydoclint
    rev: 0.8.4
    hooks:
    -   id: pydoclint
        args:
        -   --style=google
-   repo: https://github.com/PyCQA/pylint
    rev: v4.0.6
    hooks:
    -   id: pylint
        name: pylint
        entry: pylint
        language: python
        types: [python]
        # note: we install additional dependencies for
        # pylint due to it's dynamic analysis capabilities
        # and the way pre-commit references virtual environments.
        additional_dependencies:
        -   "cloudpathlib[all]>=0.24.0"
        -   "pyarrow>=24.0.0"
        -   "pytest>=9.0.3"
        -   "moto[server,s3]>=5.2.1,<6.0.0"
        -   "duckdb>=1.5.3"
        -   "parsl>=2026.5.25"
        -   "pycytominer>=1.5.1"
        -   "anndata"
