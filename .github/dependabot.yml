# GitHub Dependabot configuration
# Note: there is no interaction between this
# configuration and dependabot security updates.
# See here for more information:
# https://docs.github.com/en/code-security/dependabot/dependabot-security-updates/about-dependabot-security-updates#about-dependabot-security-updates

version: 2
updates:
  # GitHub Actions checks
  # See here for more information:
  # https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuring-dependabot-version-updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"

  # Perform checks and updates for the uv-managed Python environment.
  # See here for more information:
  # https://docs.astral.sh/uv/guides/integration/dependabot/
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      # Check for updates to uv lockfile every month
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      python-packages:
        patterns:
          - "*"

  # pre-commit updates
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      # Check for updates to pre-commit hooks every month
      interval: "monthly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "https://github.com/tox-dev/pyproject-fmt"
    groups:
      pre-commit-hooks:
        patterns:
          - "*"
